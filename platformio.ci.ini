[platformio]
default_envs = seeed_xiao_esp32s3

[env:seeed_xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
lib_deps =
    olikraus/U8g2@^2.36.17
    h2zero/NimBLE-Arduino@^1.4.3
    https://github.com/T-vK/ESP32-BLE-Keyboard.git
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DUSE_NIMBLE
board_build.partitions = huge_app.csv

extra_scripts = pre:build_scripts.py

[env:esp32-s3-fh4r2]
platform = espressif32
framework = arduino
board = esp32-s3-fh4r2
lib_deps =
    olikraus/U8g2@^2.36.17
    h2zero/NimBLE-Arduino@^1.4.3
    https://github.com/T-vK/ESP32-BLE-Keyboard.git
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DUSE_NIMBLE
board_build.partitions = huge_app.csv

extra_scripts = pre:build_scripts.py
