name: Build and Push to GHCR

on:
  push:
    branches: [main]
    paths:
      - 't2-firmware-app/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./t2-firmware-app
          push: true
          tags: |
            ghcr.io/sammothxc/t2-firmware-app:latest
            ghcr.io/sammothxc/t2-firmware-app:${{ github.sha }}