name: Build Firmware

on:
  push:
    paths:
      - 'version.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ci.ini') }}
          restore-keys: |
            pio-${{ runner.os }}-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Use CI build config (no FORCE_FIRST_BOOT)
        run: cp platformio.ci.ini platformio.ini

      - name: Resolve build version
        id: ver
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            raw="${GITHUB_REF_NAME#v}"
          else
            raw=$(python -c 'import json; v=json.load(open("version.json")); print("{}.{}.{}".format(v["major"], v["minor"], v["build"]))')
          fi
          echo "override=$raw" >> "$GITHUB_OUTPUT"

      - name: Guard against existing tag
        run: |
          tag="v${{ steps.ver.outputs.override }}"
          if git ls-remote --tags --exit-code origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "::error::Tag $tag already exists on origin. Bump version.json before pushing."
            exit 1
          fi

      - name: Build firmware
        env:
          FW_VERSION_OVERRIDE: ${{ steps.ver.outputs.override }}
        run: pio run -e seeed_xiao_esp32s3

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ steps.ver.outputs.override }}
          path: firmware/firmware.bin

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.ver.outputs.override }}
          tag_name: v${{ steps.ver.outputs.override }}
          generate_release_notes: true
          files: firmware/firmware.bin
