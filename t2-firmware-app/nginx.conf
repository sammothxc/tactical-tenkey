server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }

    location /firmware-proxy/ {
        resolver 1.1.1.1;
        proxy_pass https://github.com/;
        proxy_ssl_server_name on;
        proxy_set_header Host github.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_hide_header x-frame-options;
        proxy_redirect https://objects.githubusercontent.com/ /firmware-objects/;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=3600";
    }

    location /firmware-objects/ {
        resolver 1.1.1.1;
        proxy_pass https://objects.githubusercontent.com/;
        proxy_ssl_server_name on;
        proxy_set_header Host objects.githubusercontent.com;
        proxy_hide_header x-frame-options;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=3600";
    }

    gzip on;
    gzip_types text/html text/css application/json application/javascript;
}